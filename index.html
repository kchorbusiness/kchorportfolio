<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCHOR.EXE | OS v1.7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
:root {
  --bg-main: #d8e4e9;
  --border-thick: 4px;
  --shadow-block: 8px;
  --win-blue: #88c0d8;
  --win-green: #a3cc8d;
  --win-yellow: #f1c37d;
  --win-red: #d17a8a;
  --win-gray: #e8e8e8;
  --win-pink: #e4a1b0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--bg-main);
  background-image: radial-gradient(#adb5bd 1.5px, transparent 1.5px);
  background-size: 30px 30px;
  font-family: 'VT323', monospace;
  height: 100vh;
  overflow: hidden; 
}

/* --- LIGHTBOX (IMAGE POPUP) --- */
#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10000; cursor: zoom-out; }
#lightbox img { max-width: 90%; max-height: 90%; border: 4px solid #fff; box-shadow: 0 0 20px #000; }

/* --- LOGIN --- */
#boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
.login-box { background: var(--win-gray); border: var(--border-thick) solid #000; padding: 30px; width: 400px; box-shadow: 10px 10px 0 #333; }

/* --- LAYOUT --- */
#main-ui { display: none; grid-template-columns: 100px 1fr 450px; height: calc(100vh - 40px); }

/* --- LEFT ICONS --- */
.desktop-icons { padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 2px dashed #000; }
.icon { text-align: center; cursor: pointer; }
.icon-graphic { width: 50px; height: 50px; margin: 0 auto; border: 3px solid #000; background: #fff; box-shadow: 4px 4px 0 #000; display:flex; align-items:center; justify-content:center; font-size: 24px;}
.icon span { font-size: 14px; background: #000; color: #fff; padding: 0 4px; display: inline-block; margin-top: 5px;}

/* --- WORKSPACE (CENTER) --- */
.workspace { padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }

/* --- WINDOWS --- */
.window { background: #fff; border: var(--border-thick) solid #000; box-shadow: var(--shadow-block) var(--shadow-block) 0 #000; }
.title-bar { padding: 8px 12px; border-bottom: var(--border-thick) solid #000; display: flex; justify-content: space-between; font-weight: bold; font-size: 20px;}

/* --- DIRECTORY --- */
.sys-dir-container { height: 280px; overflow-y: scroll; padding: 15px; background: #f0f0f0; border-top: 2px solid #000; }
.system-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
.sys-item { border: 2px solid #000; padding: 12px; text-align: center; background: #fff; cursor: pointer; }
.sys-item:hover { background: var(--win-yellow); }
.sys-item.active { background: var(--win-blue); color: #fff; }

/* --- INSPECTOR (RIGHT) --- */
.inspector-panel { padding: 25px; display: flex; flex-direction: column; gap: 20px; border-left: 2px dashed #000; background: rgba(255,255,255,0.3); }
#main-player { width: 100%; aspect-ratio: 16/9; border: var(--border-thick) solid #000; background: #000; }
.detail-box { padding: 15px; background: #fff; border: 3px solid #000; flex-grow: 1; }

/* --- REVIEWS --- */
.review-entry { border-bottom: 2px solid #eee; padding: 15px 0; position: relative; display: flex; flex-direction: column; gap: 8px;}
.review-pic { max-width: 200px; border: 3px solid #000; cursor: zoom-in; margin-top: 5px;}
.del-btn { background: var(--win-red); color: white; border: 2px solid #000; padding: 2px 8px; cursor: pointer; position: absolute; right: 0; top: 15px; }

/* --- TASKBAR --- */
.taskbar { grid-column: span 3; position: fixed; bottom: 0; width: 100%; height: 40px; background: var(--win-gray); border-top: var(--border-thick) solid #000; display: flex; align-items: center; padding: 0 15px; z-index: 100; font-size: 18px;}
.btn-pixel { background: var(--win-blue); border: 2px solid #000; padding: 4px 10px; font-family: inherit; cursor: pointer; box-shadow: 2px 2px 0 #000; }
</style>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()"><img src="" id="lightbox-img"></div>

<div id="boot-screen">
    <div class="login-box">
        <h2>SYSTEM_LOGIN.EXE</h2>
        <input type="text" id="username-input" style="width:100%; padding:10px; border:3px solid #000; font-family:inherit; font-size:20px; margin: 15px 0;" placeholder="Enter Name...">
        <div style="display:flex; gap:10px;">
            <button class="btn-pixel" onclick="randomizeName()">RANDOM</button>
            <button class="btn-pixel" style="background:var(--win-green); flex-grow:1;" onclick="login()">BOOT_OS</button>
        </div>
    </div>
</div>

<div id="main-ui">
    <div class="desktop-icons">
        <div class="icon"><div class="icon-graphic" style="background:var(--win-blue)">💾</div><span>C_DRIVE</span></div>
        <div class="icon" onclick="location.reload()"><div class="icon-graphic" style="background:var(--win-red)">⚡</div><span>REBOOT</span></div>
    </div>

    <div class="workspace">
        <div class="window">
            <div class="title-bar" style="background: var(--win-pink);"><span>USER_PROFILE.INF</span></div>
            <div style="display:flex; gap:20px; padding:25px; align-items:center;">
                <div style="width:90px; height:90px; border:4px solid #000; background:var(--win-blue); display:flex; align-items:center; justify-content:center; font-size:50px; font-weight:bold; box-shadow:5px 5px 0 #000;">K</div>
                <div><h1 style="font-size:45px; line-height:0.8;">KCHOR</h1><p style="font-size:22px;">Roblox Systems Architect</p></div>
            </div>
        </div>

        <div class="window">
            <div class="title-bar" style="background: var(--win-yellow);"><span>SYSTEM_DIRECTORY</span></div>
            <div class="sys-dir-container"><div class="system-grid" id="sysGrid"></div></div>
        </div>

        <div class="window">
            <div class="title-bar" style="background: var(--win-green);"><span>FEEDBACK_LOG.LOG</span></div>
            <div style="padding: 15px;">
                <div id="star-rating" style="font-size: 30px; cursor: pointer; color: #ccc;">
                    <span data-value="1">☆</span><span data-value="2">☆</span><span data-value="3">☆</span><span data-value="4">☆</span><span data-value="5">☆</span>
                </div>
                <div id="preview-wrap" style="display:none; margin: 10px 0; align-items:center; gap:10px;">
                    <img id="img-preview" style="width:60px; height:60px; border:2px solid #000; object-fit:cover;">
                    <button class="btn-pixel" style="background:var(--win-red)" onclick="removeImage()">X</button>
                </div>
                <textarea id="rev-text" style="width:100%; height:60px; border:3px solid #000; margin:10px 0; padding:10px; font-family:inherit; font-size:18px; resize:none;" placeholder="Log your report..."></textarea>
                <button class="btn-pixel" onclick="document.getElementById('file-input').click()">+ IMAGE</button>
                <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(this)">
                <button class="btn-pixel" onclick="submitReview()" style="background:var(--win-blue)">SUBMIT</button>
                <button id="admin-wipe" class="btn-pixel" onclick="clearAll()" style="background:var(--win-red); float:right; display:none;">WIPE_ALL</button>
                <div class="review-list" id="review-list"></div>
            </div>
        </div>
    </div>

    <div class="inspector-panel">
        <div class="window">
            <div class="title-bar" style="background:#000; color:#fff;"><span>LIVE_FEED.EXE</span></div>
            <video id="main-player" controls autoplay muted loop></video>
        </div>
        <div class="window" style="flex-grow:1;">
            <div class="title-bar" style="background:var(--win-blue);"><span>PROJECT_SPECS</span></div>
            <div class="detail-box">
                <h2 id="det-title" style="font-size:28px;">Select Module</h2>
                <hr style="margin:10px 0; border:1px dashed #000;">
                <p id="det-desc" style="font-size:20px; line-height:1.3;">Awaiting system selection for technical breakdown.</p>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="btn-pixel" style="background:var(--win-red)">START</button>
        <div style="flex-grow:1; margin-left:15px;" id="taskbar-user">User: Guest</div>
        <div id="clock">00:00</div>
    </div>
</div>

<script>
// --- CONFIGURE YOUR PROJECTS HERE ---
const systems = [
    { name: "Round System", desc: "Manages server-wide game loops, maps, and teleportation.", vid: "https://vjs.zencdn.net/v/oceans.mp4" },
    { name: "Combat System", desc: "Raycast-based hit detection with server-side lag compensation.", vid: "" },
    { name: "Weather System", desc: "Dynamic lighting and particle manipulation based on server time.", vid: "" },
    { name: "Data Saving", desc: "ProfileService integration with fail-safe session locking.", vid: "" }
    // Add more objects here...
];

let currentUser = "Guest", currentRating = 0, currentImageData = "";

function login() {
    const val = document.getElementById('username-input').value;
    currentUser = val || "Guest_" + Math.floor(Math.random()*999);
    document.getElementById('boot-screen').style.display = 'none';
    document.getElementById('main-ui').style.display = 'grid';
    document.getElementById('taskbar-user').innerText = "User: " + currentUser;
    if(currentUser === "KCHOR_ADMIN") document.getElementById('admin-wipe').style.display = 'block';
    loadReviews();
}

function randomizeName() { document.getElementById('username-input').value = "Dev_" + Math.floor(Math.random()*999); }

// --- UI GENERATION ---
const grid = document.getElementById('sysGrid');
systems.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sys-item';
    div.innerHTML = `<strong>${s.name}</strong><br><small>BOOT.EXE</small>`;
    div.onclick = () => {
        document.querySelectorAll('.sys-item').forEach(i => i.classList.remove('active'));
        div.classList.add('active');
        document.getElementById('det-title').innerText = s.name;
        document.getElementById('det-desc').innerText = s.desc;
        const v = document.getElementById('main-player');
        v.src = s.vid;
        if(s.vid) v.play();
    };
    grid.appendChild(div);
});

// --- IMAGE & LIGHTBOX ---
function handleImage(input) {
    const reader = new FileReader();
    reader.onload = (e) => { currentImageData = e.target.result; document.getElementById('img-preview').src = currentImageData; document.getElementById('preview-wrap').style.display = 'flex'; };
    reader.readAsDataURL(input.files[0]);
}
function removeImage() { currentImageData = ""; document.getElementById('preview-wrap').style.display = 'none'; }
function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

// --- REVIEWS ---
function submitReview() {
    const text = document.getElementById('rev-text').value;
    if(!text || currentRating === 0) return alert("Select stars and write text!");
    const logs = JSON.parse(localStorage.getItem('kchor_v7')) || [];
    logs.push({ user: currentUser, rate: currentRating, msg: text, pic: currentImageData });
    localStorage.setItem('kchor_v7', JSON.stringify(logs));
    document.getElementById('rev-text').value = ""; removeImage(); currentRating = 0; resetStars(); loadReviews();
}

function loadReviews() {
    const logs = JSON.parse(localStorage.getItem('kchor_v7')) || [];
    const list = document.getElementById('review-list');
    list.innerHTML = "";
    logs.reverse().forEach((r, i) => {
        const entry = document.createElement('div');
        entry.className = 'review-entry';
        const del = (r.user === currentUser || currentUser === "KCHOR_ADMIN") ? `<button class="del-btn" onclick="delRev(${logs.length-1-i})">DEL</button>` : "";
        const pic = r.pic ? `<img src="${r.pic}" class="review-pic" onclick="openLightbox('${r.pic}')">` : "";
        entry.innerHTML = `<div><b>${r.user}</b> <span style="color:orange">${'★'.repeat(r.rate)}</span>${del}</div><p>${r.msg}</p>${pic}`;
        list.appendChild(entry);
    });
}

function delRev(i) { if(confirm("Delete?")) { let l = JSON.parse(localStorage.getItem('kchor_v7')); l.splice(i, 1); localStorage.setItem('kchor_v7', JSON.stringify(l)); loadReviews(); } }
function clearAll() { if(confirm("Wipe all?")) { localStorage.removeItem('kchor_v7'); loadReviews(); } }

const stars = document.querySelectorAll('#star-rating span');
stars.forEach(s => s.onclick = () => {
    currentRating = s.getAttribute('data-value');
    stars.forEach(star => star.innerText = star.getAttribute('data-value') <= currentRating ? '★' : '☆');
});
function resetStars() { stars.forEach(s => s.innerText = '☆'); }
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
</script>
</body>
</html>
