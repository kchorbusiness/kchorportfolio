<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCHOR.EXE | WORK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #ffffff;
  --border-size: 3px;
  --shadow-off: 6px;
  /* Palette from your image */
  --win-blue: #88c0d8;
  --win-green: #a3cc8d;
  --win-yellow: #f1c37d;
  --win-red: #d17a8a;
  --win-gray: #e8e8e8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: #fcf9f2;
  font-family: 'VT323', monospace;
  color: #2b2b2b;
  padding: 20px;
}

/* TOP NAV */
nav {
  background: var(--win-blue);
  border: var(--border-size) solid #000;
  box-shadow: var(--shadow-off) var(--shadow-off) 0 #000;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.logo { font-size: 24px; font-weight: bold; }
.nav-links a { 
  text-decoration: none; 
  color: #000; 
  margin-left: 20px; 
  font-size: 22px;
  border-bottom: 2px solid transparent;
}
.nav-links a:hover { border-bottom: 2px solid #000; }

/* HERO WINDOW */
.hero-window {
  max-width: 800px;
  margin: 0 auto 50px;
  background: #fff;
  border: var(--border-size) solid #000;
  box-shadow: var(--shadow-off) var(--shadow-off) 0 #000;
}

.title-bar {
  background: var(--win-green);
  border-bottom: var(--border-size) solid #000;
  padding: 8px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.win-buttons { display: flex; gap: 6px; }
.win-btn {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #000;
  background: #fff;
}

.content-area { padding: 30px; text-align: center; }
.content-area h1 { font-size: 48px; margin-bottom: 10px; }
.content-area p { font-size: 24px; margin-bottom: 20px; color: #555; }

/* PROJECT CARDS */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  max-width: 1000px;
  margin: 0 auto;
}

.project-card {
  background: #fff;
  border: var(--border-size) solid #000;
  box-shadow: var(--shadow-off) var(--shadow-off) 0 #000;
  transition: transform 0.1s;
  cursor: pointer;
}

.project-card:active {
  transform: translate(3px, 3px);
  box-shadow: 3px 3px 0 #000;
}

.card-header {
  padding: 6px 12px;
  border-bottom: var(--border-size) solid #000;
  font-weight: bold;
  font-size: 18px;
  display: flex;
  justify-content: space-between;
}

.card-body { padding: 20px; }
.card-body h3 { font-size: 28px; margin-bottom: 5px; }

/* PANEL MODAL */
#panel {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 90%; max-width: 500px;
  background: #fff;
  border: var(--border-size) solid #000;
  box-shadow: 12px 12px 0 #000;
  display: none;
  z-index: 1001;
}

#overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,0.7);
  display: none; z-index: 1000;
}

.btn-main {
  background: var(--win-yellow);
  border: var(--border-size) solid #000;
  padding: 8px 20px;
  font-family: inherit;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 4px 4px 0 #000;
}
.btn-main:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }

</style>
</head>
<body>

<nav>
  <div class="logo">KCHOR.SYS</div>
  <div class="nav-links">
    <a href="#">PROJECTS</a>
    <a href="#">LOGS</a>
    <a href="#">ABOUT</a>
  </div>
</nav>

<section class="hero-window">
  <div class="title-bar">
    <span>SYSTEM_GREETING.EXE</span>
    <div class="win-buttons">
      <div class="win-btn"></div>
      <div class="win-btn"></div>
      <div class="win-btn" style="background: var(--win-red);"></div>
    </div>
  </div>
  <div class="content-area">
    <h1>KCHOR IS ONLINE</h1>
    <p>Creating chaotic systems for digital playgrounds.</p>
    <button class="btn-main" onclick="scrollDown()">INITIALIZE_WORK</button>
  </div>
</section>

<div class="projects-grid" id="grid"></div>

<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="title-bar" id="pHeader" style="background: var(--win-yellow);">
    <span id="pTitle">VIEWER</span>
    <div class="win-buttons" onclick="closePanel()" style="cursor:pointer">
      <div class="win-btn" style="background: var(--win-red);"></div>
    </div>
  </div>
  <div style="padding: 20px;">
    <div style="width:100%; height:200px; background:#000; border:var(--border-size) solid #000; margin-bottom:15px;">
        <video id="pVideo" style="width:100%; height:100%;" controls></video>
    </div>
    <p id="pText" style="font-size:22px;"></p>
  </div>
</div>

<script>
const projs = [
  { t: "ROUND SYSTEM", d: "Core Gameplay Loop", c: "var(--win-blue)", f: "Manages server-wide timers, teleportation, and win conditions." },
  { t: "STORM ENGINE", d: "Dynamic Weather", c: "var(--win-green)", f: "A physics-based weather system including tornados and particle-heavy blizzards." },
  { t: "COMBAT V3", d: "Physics Combat", c: "var(--win-red)", f: "Raycast-based hit detection with custom knockback and animation blending." }
];

const grid = document.getElementById('grid');
projs.forEach(p => {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.innerHTML = `
    <div class="card-header" style="background: ${p.c}">
      <span>${p.t}</span>
      <span>●</span>
    </div>
    <div class="card-body">
      <h3>${p.t}</h3>
      <p>${p.d}</p>
    </div>
  `;
  card.onclick = () => {
    document.getElementById('pTitle').innerText = p.t;
    document.getElementById('pText').innerText = p.f;
    document.getElementById('pHeader').style.background = p.c;
    document.getElementById('panel').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
  };
  grid.appendChild(card);
});

function closePanel() {
  document.getElementById('panel').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

function scrollDown() {
  window.scrollTo({top: 600, behavior: 'smooth'});
}
</script>

</body>
</html>
