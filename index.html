<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCHOR.EXE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  background:#000080;
  font-family:'VT323', monospace;
  color:#fff;
  overflow-x:hidden;
}

/* ── TOP BAR ── */
nav {
  background:#c0c0c0;
  border-bottom:3px solid black;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:4px 4px 0 black;
}
.logo {
  font-family:'Press Start 2P';
  font-size:12px;
  color:black;
}
.nav-links a {
  margin-left:15px;
  text-decoration:none;
  color:black;
  font-size:18px;
}

/* ── HERO ── */
.hero {
  padding:60px 20px;
}
.hero h1 {
  font-family:'Press Start 2P';
  font-size:28px;
  margin-bottom:20px;
}
.hero p {
  font-size:20px;
  margin-bottom:20px;
}
.hero button {
  background:yellow;
  border:3px solid black;
  box-shadow:3px 3px 0 black;
  padding:10px;
  font-family:'Press Start 2P';
  cursor:pointer;
}
.hero button:active {
  transform:translate(3px,3px);
  box-shadow:none;
}

/* ── MARQUEE ── */
marquee {
  background:black;
  padding:10px;
  color:lime;
  font-size:20px;
}

/* ── PROJECT GRID ── */
.projects {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:#c0c0c0;
  border:3px solid black;
  box-shadow:4px 4px 0 black;
  cursor:pointer;
  transition:0.2s;
}
.card:hover {
  transform:rotate(-2deg) scale(1.05);
}

.window-bar {
  background:#000;
  color:#0f0;
  padding:6px;
  font-size:14px;
  border-bottom:2px solid black;
}

.card-body {
  padding:15px;
  color:black;
}
.card-body h3 {
  font-family:'Press Start 2P';
  font-size:12px;
  margin-bottom:10px;
}
.card-body p {
  font-size:18px;
}

/* ── POPUP PANEL ── */
#panel {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:90%;
  max-width:500px;
  background:#c0c0c0;
  border:4px solid black;
  box-shadow:6px 6px 0 black;
  z-index:999;
  transition:0.3s;
}
#panel.active {
  transform:translate(-50%,-50%) scale(1);
}

.panel-header {
  background:#000;
  color:#0f0;
  padding:8px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}
.panel-content {
  padding:20px;
  color:black;
  font-size:20px;
}
.close-btn {
  cursor:pointer;
}

/* ── ABOUT ── */
.about {
  padding:40px 20px;
}
.about h2 {
  font-family:'Press Start 2P';
  font-size:16px;
  margin-bottom:20px;
}
.about p {
  font-size:20px;
}

/* ── FOOTER ── */
footer {
  margin-top:40px;
  padding:10px;
  background:#c0c0c0;
  border-top:3px solid black;
  text-align:center;
  color:black;
  font-size:18px;
}
</style>

</head>

<body>

<nav>
  <div class="logo">KCHOR.EXE</div>
  <div class="nav-links">
    <a href="#">WORK</a>
    <a href="#">ABOUT</a>
  </div>
</nav>

<marquee>🔥 WELCOME TO MY EPIC ROBLOX DEV WEBSITE 🔥 CLICK STUFF!!! 🔥</marquee>

<section class="hero">
  <h1>HI I'M KCHOR</h1>
  <p>I build chaotic and cool Roblox systems.</p>
  <button onclick="scrollToProjects()">VIEW PROJECTS</button>
</section>

<section class="projects" id="projects"></section>

<section class="about">
  <h2>ABOUT ME</h2>
  <p>
    Roblox developer. I build systems, chaos, and fun gameplay.
    Nothing here is boring.
  </p>
</section>

<footer>
  © KCHOR DEV 2005 (NOT REALLY)
</footer>

<div id="panel">
  <div class="panel-header">
    <span id="panelTitle">PROJECT.EXE</span>
    <span class="close-btn" onclick="closePanel()">X</span>
  </div>
  <div class="panel-content" id="panelContent"></div>
</div>

<script>
const projects = [
  {title:"ROUND SYSTEM",desc:"Controls the entire game loop."},
  {title:"WEATHER SYSTEM",desc:"Random chaos disasters."},
  {title:"COMBAT SYSTEM",desc:"Punch things. Hard."},
  {title:"NPC AI",desc:"Smart enemies with behavior."},
  {title:"INVENTORY",desc:"Custom backpack system."}
];

const container = document.getElementById("projects");

projects.forEach((p,i)=>{
  const el = document.createElement("div");
  el.className="card";
  el.innerHTML = `
    <div class="window-bar">project_${i}.exe</div>
    <div class="card-body">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
    </div>
  `;
  el.onclick=()=>openPanel(p);
  container.appendChild(el);
});

function openPanel(p){
  document.getElementById("panel").classList.add("active");
  document.getElementById("panelTitle").textContent=p.title+".EXE";
  document.getElementById("panelContent").textContent=p.desc;
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
