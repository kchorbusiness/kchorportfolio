<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kenny Dev Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #07070d;
  color: white;
  overflow: hidden;
}

/* LOADING SCREEN */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  font-size: 24px;
  animation: fadeOut 1s ease forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

nav h1 {
  color: #a855f7;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.5s;
}

.blur {
  filter: blur(10px);
  transform: scale(1.1);
}

/* PROJECTS */
.projects {
  padding: 100px 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card:hover {
  transform: scale(1.05);
}

.card h3 {
  position: absolute;
  bottom: 10px;
  left: 10px;
}

/* PROJECT VIEW */
.project-view {
  position: fixed;
  top: 0;
  left: 100%;
  width: 100%;
  height: 100%;
  display: flex;
  background: #07070d;
  transition: 0.6s;
}

.project-view.active {
  left: 0;
}

.video {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.video video {
  width: 90%;
  border-radius: 10px;
}

.info {
  width: 50%;
  padding: 40px;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  cursor: pointer;
  color: #a855f7;
}
</style>
</head>

<body>

<div id="loader">Loading Kenny.dev...</div>

<nav>
  <h1>Kenny.dev</h1>
</nav>

<div id="mainContent">

<div class="hero" id="hero">
  <h2>Hi, I'm <span style="color:#a855f7;">Kenny</span></h2>
  <p>Roblox Developer • Scripter • Designer</p>
</div>

<div class="projects">
  <div class="card" onclick="openProject('p1')">
    <img src="https://via.placeholder.com/400x200">
    <h3>Boat System</h3>
  </div>

  <div class="card" onclick="openProject('p2')">
    <img src="https://via.placeholder.com/400x200">
    <h3>Airdrop System</h3>
  </div>
</div>

</div>

<!-- PROJECT -->
<div id="p1" class="project-view">
  <div class="close" onclick="closeProject()">✕</div>
  <div class="video">
    <video controls>
      <source src="your-video.mp4" type="video/mp4">
    </video>
  </div>
  <div class="info">
    <h1>Boat System</h1>
    <p>Advanced Roblox system with captain roles and mechanics.</p>
  </div>
</div>

<div id="p2" class="project-view">
  <div class="close" onclick="closeProject()">✕</div>
  <div class="video">
    <video controls>
      <source src="your-video2.mp4" type="video/mp4">
    </video>
  </div>
  <div class="info">
    <h1>Airdrop System</h1>
    <p>Reward drop system with UI and effects.</p>
  </div>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>
const hero = document.getElementById("hero");
const sound = document.getElementById("clickSound");

function openProject(id) {
  sound.play();
  hero.classList.add("blur");
  document.getElementById(id).classList.add("active");
  history.pushState(null, "", "#" + id);
}

function closeProject() {
  hero.classList.remove("blur");
  document.querySelectorAll(".project-view").forEach(p => {
    p.classList.remove("active");
  });
  history.pushState("", document.title, window.location.pathname);
}

// HANDLE BACK BUTTON / URL
window.onpopstate = () => {
  closeProject();
};

// AUTO OPEN IF URL HAS #
window.onload = () => {
  const hash = window.location.hash.replace("#", "");
  if (hash) {
    openProject(hash);
  }
};
</script>

</body>
</html>
