<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCHOR.EXE | SYSTEM_OVERRIDE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
:root {
  --bg-main: #d8e4e9;
  --border-thick: 3px;
  --shadow-block: 6px;
  --win-blue: #88c0d8;
  --win-green: #a3cc8d;
  --win-yellow: #f1c37d;
  --win-red: #d17a8a;
  --win-gray: #e8e8e8;
  --win-pink: #e4a1b0;
  --win-purple: #b4a1e4;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--bg-main);
  background-image: radial-gradient(#adb5bd 1px, transparent 1px);
  background-size: 25px 25px;
  font-family: 'VT323', monospace;
  color: #1a1a1a;
  height: 100vh;
  overflow: hidden; 
}

/* --- DESKTOP ICONS --- */
.desktop-icons {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 5;
}

.icon {
  width: 80px;
  text-align: center;
  cursor: pointer;
}

.icon-graphic {
  width: 40px;
  height: 40px;
  margin: 0 auto;
  border: var(--border-thick) solid #000;
  background: #fff;
  box-shadow: 3px 3px 0 #000;
}

.icon span {
  font-size: 14px;
  background: #000;
  color: #fff;
  padding: 0 4px;
}

/* --- WORKSPACE --- */
.workspace {
  margin-left: 110px;
  padding: 20px;
  height: calc(100vh - 45px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

/* --- WINDOW DESIGN --- */
.window {
  background: #fff;
  border: var(--border-thick) solid #000;
  box-shadow: var(--shadow-block) var(--shadow-block) 0 #000;
  width: 100%;
  max-width: 1000px;
}

.title-bar {
  padding: 6px 12px;
  border-bottom: var(--border-thick) solid #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}

.win-btns { display: flex; gap: 5px; }
.win-dot { width: 10px; height: 10px; border: 2px solid #000; border-radius: 50%; background: #fff; }

/* --- SYSTEM GRID --- */
.system-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.sys-item {
  border: 2px solid #000;
  padding: 10px;
  text-align: center;
  background: var(--win-gray);
  cursor: help;
}

.sys-item:hover { background: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #000; }

/* --- REVIEW SECTION --- */
.review-box {
  padding: 20px;
  background: #fff;
}

.star-rating {
  font-size: 30px;
  color: var(--win-yellow);
  cursor: pointer;
  margin-bottom: 10px;
}

.star-rating span:hover, .star-rating span.active { color: orange; }

textarea {
  width: 100%;
  height: 80px;
  border: 2px solid #000;
  font-family: inherit;
  padding: 10px;
  font-size: 18px;
  resize: none;
}

/* --- TASKBAR --- */
.taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: var(--win-gray);
  border-top: var(--border-thick) solid #000;
  display: flex;
  align-items: center;
  padding: 0 15px;
  z-index: 100;
}

.btn-start {
  background: var(--win-red);
  border: 2px solid #000;
  padding: 2px 10px;
  font-family: inherit;
  font-weight: bold;
  margin-right: 15px;
  box-shadow: 2px 2px 0 #000;
}

/* --- MODAL --- */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 1000; }
#modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border: 3px solid #000; width: 400px; display: none; z-index: 1001; padding: 20px; box-shadow: 10px 10px 0 #000;}

</style>
</head>
<body>

<div class="desktop-icons">
  <div class="icon"><div class="icon-graphic" style="background:var(--win-blue)"></div><span>DRIVE_C</span></div>
  <div class="icon"><div class="icon-graphic" style="background:var(--win-purple)"></div><span>TRASH</span></div>
  <div class="icon"><div class="icon-graphic" style="background:var(--win-pink)"></div><span>DEV_LOG</span></div>
</div>

<div class="workspace">
  
  <div class="window">
    <div class="title-bar" style="background: var(--win-yellow);">
      <span>KCHOR_INTRO.EXE</span>
      <div class="win-btns"><div class="win-dot"></div><div class="win-dot" style="background:var(--win-red)"></div></div>
    </div>
    <div style="padding: 20px; display: flex; align-items: center; gap: 20px;">
        <div style="width: 80px; height: 80px; border: 3px solid #000; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 40px;">K</div>
        <div>
            <h1>KCHOR SYSTEMS v1.0</h1>
            <p style="font-size: 20px;">Building robust, chaotic, and scalable Roblox engines.</p>
        </div>
    </div>
  </div>

  <div class="window">
    <div class="title-bar" style="background: var(--win-blue);">
      <span>SYSTEM_DIRECTORY (/root/systems)</span>
      <div class="win-btns"><div class="win-dot"></div><div class="win-dot"></div></div>
    </div>
    <div class="system-grid" id="sysGrid"></div>
  </div>

  <div class="window">
    <div class="title-bar" style="background: var(--win-green);">
      <span>USER_FEEDBACK.EXE</span>
      <div class="win-btns"><div class="win-dot"></div><div class="win-dot"></div></div>
    </div>
    <div class="review-box">
        <h3>SUBMIT A REVIEW</h3>
        <div class="star-rating" id="stars">
            <span data-v="1">☆</span><span data-v="2">☆</span><span data-v="3">☆</span><span data-v="4">☆</span><span data-v="5">☆</span>
        </div>
        <textarea placeholder="Type your thoughts here..."></textarea>
        <button class="btn-start" style="margin-top: 10px; background: var(--win-yellow); cursor: pointer;">POST_REVIEW</button>
        
        <div id="reviewList" style="margin-top: 20px; border-top: 2px dashed #000; padding-top: 10px;">
            <p><i>No reviews yet. Be the first!</i></p>
        </div>
    </div>
  </div>

</div>

<div class="taskbar">
  <button class="btn-start">START</button>
  <div style="flex-grow: 1; font-size: 18px;">KCHOR_OS // Active</div>
  <div id="clock">00:00</div>
</div>

<div id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h2 id="mTitle"></h2>
    <p id="mDesc" style="font-size: 20px; margin: 15px 0;"></p>
    <button class="btn-start" onclick="closeModal()">CLOSE</button>
</div>

<script>
const systems = [
    "Round System", "Flower Generation", "Weather System", "Title System", 
    "Backpack System", "Upgrade System", "Global Announcement", "Global Ban", 
    "Bridge System", "Power System", "Generator System", "Combat System", 
    "Dialogue System", "Shop System", "Killer/Captain", "Data Saving", 
    "Movement System", "Weapon Choose", "NPC Behavior"
];

const grid = document.getElementById('sysGrid');
systems.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sys-item';
    div.innerHTML = `<strong>${s}</strong><br><small>Ready.bin</small>`;
    div.onclick = () => {
        document.getElementById('mTitle').innerText = s;
        document.getElementById('mDesc').innerText = `Detailed documentation for the ${s} module. Optimized for high-concurrency server environments.`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    };
    grid.appendChild(div);
});

// Star Rating Logic
const stars = document.querySelectorAll('#stars span');
stars.forEach(star => {
    star.onclick = () => {
        const val = star.getAttribute('data-v');
        stars.forEach(s => {
            s.innerText = s.getAttribute('data-v') <= val ? '★' : '☆';
            s.classList.toggle('active', s.getAttribute('data-v') <= val);
        });
    };
});

function closeModal() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('modal').style.display = 'none';
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
