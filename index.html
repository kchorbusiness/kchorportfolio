<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCHOR.EXE | OS v1.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
:root {
  --bg-main: #d8e4e9;
  --border-thick: 4px;
  --shadow-block: 8px;
  --win-blue: #88c0d8;
  --win-green: #a3cc8d;
  --win-yellow: #f1c37d;
  --win-red: #d17a8a;
  --win-gray: #e8e8e8;
  --win-pink: #e4a1b0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--bg-main);
  background-image: radial-gradient(#adb5bd 1.5px, transparent 1.5px);
  background-size: 30px 30px;
  font-family: 'VT323', monospace;
  height: 100vh;
  overflow: hidden; 
}

/* --- LOGIN SCREEN --- */
#boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
.login-box { background: var(--win-gray); border: var(--border-thick) solid #000; padding: 30px; width: 400px; box-shadow: 10px 10px 0 #333; }

/* --- GRID LAYOUT --- */
#main-ui { display: none; grid-template-columns: 100px 1fr 450px; height: calc(100vh - 40px); }

/* --- LEFT ICONS --- */
.desktop-icons { padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 2px dashed #000; }
.icon { text-align: center; cursor: pointer; }
.icon-graphic { width: 50px; height: 50px; margin: 0 auto; border: 3px solid #000; background: #fff; box-shadow: 4px 4px 0 #000; display:flex; align-items:center; justify-content:center; font-size: 24px;}
.icon span { font-size: 14px; background: #000; color: #fff; padding: 0 4px; display: inline-block;}

/* --- CENTER WORKSPACE --- */
.workspace { padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }

/* --- WINDOW DESIGN --- */
.window { background: #fff; border: var(--border-thick) solid #000; box-shadow: var(--shadow-block) var(--shadow-block) 0 #000; }
.title-bar { padding: 8px 12px; border-bottom: var(--border-thick) solid #000; display: flex; justify-content: space-between; font-weight: bold; font-size: 20px;}

/* --- SCROLLABLE DIRECTORY --- */
.sys-dir-container { height: 280px; overflow-y: scroll; padding: 15px; background: #f0f0f0; border-top: 2px solid #000; }
.system-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.sys-item { border: 2px solid #000; padding: 12px; text-align: center; background: #fff; cursor: pointer; font-size: 14px; }
.sys-item:hover { background: var(--win-yellow); transform: translateY(-3px); box-shadow: 4px 4px 0 #000; }
.sys-item.active { background: var(--win-blue); color: white; border-color: #000; }

/* --- RIGHT PANEL (INSPECTOR) --- */
.inspector-panel { padding: 25px; display: flex; flex-direction: column; gap: 20px; border-left: 2px dashed #000; background: rgba(255,255,255,0.3); }
video { width: 100%; aspect-ratio: 16/9; border: var(--border-thick) solid #000; background: #000; object-fit: cover; }
.detail-box { padding: 15px; background: #fff; border: 3px solid #000; box-shadow: 5px 5px 0 #000; }

/* --- REVIEWS (THE NEW LAYOUT) --- */
.review-area { padding: 15px; }
.review-list { max-height: 250px; overflow-y: auto; margin-top: 10px; border-top: 2px dashed #000; padding-top: 10px; }
.review-entry { border-bottom: 2px solid #ddd; padding: 10px 0; position: relative; display: flex; flex-direction: column; gap: 5px;}
.review-pic { max-width: 150px; border: 3px solid #000; cursor: zoom-in; }
.del-btn { background: var(--win-red); color: white; border: 2px solid #000; padding: 2px 6px; font-size: 12px; cursor: pointer; position: absolute; top: 10px; right: 10px;}

/* --- TASKBAR & MODALS --- */
.taskbar { grid-column: span 3; position: fixed; bottom: 0; width: 100%; height: 40px; background: var(--win-gray); border-top: var(--border-thick) solid #000; display: flex; align-items: center; padding: 0 15px; z-index: 100; }
.btn-pixel { background: var(--win-blue); border: 2px solid #000; padding: 4px 10px; font-family: inherit; cursor: pointer; box-shadow: 2px 2px 0 #000; margin-right: 5px;}

/* LIGHTBOX MODAL (Image Pop) */
#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; cursor: zoom-out; }
#lightbox img { max-width: 90%; max-height: 90%; border: var(--border-thick) solid #000; box-shadow: 10px 10px 0 rgba(255,255,255,0.3);}
</style>
</head>
<body>

<div id="lightbox" onclick="closeLightbox()"><img src="" id="lightbox-img"></div>

<div id="boot-screen">
    <div class="login-box">
        <h2 style="margin-bottom: 10px;">SYSTEM_LOGIN.EXE</h2>
        <input type="text" id="username-input" style="width:100%; padding:10px; border:3px solid #000; font-family:inherit; font-size:20px; margin-bottom:10px;" placeholder="Username...">
        <div style="display:flex; gap:10px;">
            <button class="btn-pixel" style="background:var(--win-yellow)" onclick="randomizeName()">RANDOM</button>
            <button class="btn-pixel" style="background:var(--win-green); flex-grow:1;" onclick="login()">ENTER_OS</button>
        </div>
    </div>
</div>

<div id="main-ui">
    <div class="desktop-icons">
        <div class="icon"><div class="icon-graphic" style="background:var(--win-blue)">💾</div><span>DISK_C</span></div>
        <div class="icon" onclick="location.reload()"><div class="icon-graphic" style="background:var(--win-red)">⚡</div><span>REBOOT</span></div>
    </div>

    <div class="workspace">
        <div class="window">
            <div class="title-bar" style="background: var(--win-pink);"><span>KCHOR.INF</span></div>
            <div style="display:flex; gap:20px; padding:20px; align-items:center;">
                <div style="width:80px; height:80px; border:3px solid #000; background:var(--win-blue); display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:bold; box-shadow:5px 5px 0 #000;">K</div>
                <div><h1>KCHOR SYSTEMS</h1><p style="font-size:22px;">Roblox Backend Architect</p></div>
            </div>
        </div>

        <div class="window">
            <div class="title-bar" style="background: var(--win-yellow);"><span>SYSTEM_DIRECTORY (/root/modules)</span></div>
            <div class="sys-dir-container"><div class="system-grid" id="sysGrid"></div></div>
        </div>

        <div class="window">
            <div class="title-bar" style="background: var(--win-green);"><span>COMMUNITY_FEEDBACK.LOG</span></div>
            <div class="review-area">
                <div id="star-rating" style="font-size: 28px; cursor: pointer; color: #ccc;">
                    <span data-value="1">☆</span><span data-value="2">☆</span><span data-value="3">☆</span><span data-value="4">☆</span><span data-value="5">☆</span>
                </div>
                <div id="preview-wrap" style="display:none; margin: 10px 0; align-items:center; gap:10px;">
                    <img id="img-preview" style="width:60px; height:60px; border:2px solid #000; object-fit:cover;">
                    <button class="btn-pixel" style="background:var(--win-red)" onclick="removeImage()">REMOVE</button>
                </div>
                <textarea id="rev-text" style="width:100%; height:60px; border:2px solid #000; margin:10px 0; padding:10px; font-family:inherit; font-size:18px; resize:none;" placeholder="Write a review..."></textarea>
                <div style="display:flex; justify-content: space-between;">
                    <div>
                        <button class="btn-pixel" onclick="document.getElementById('file-input').click()" style="background:var(--win-gray)">+ IMG</button>
                        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(this)">
                        <button class="btn-pixel" onclick="submitReview()" style="background:var(--win-blue)">POST_REVIEW</button>
                    </div>
                    <button id="admin-wipe" class="btn-pixel" onclick="clearAllReviews()" style="background:var(--win-red); display:none;">WIPE_ALL</button>
                </div>
                <div class="review-list" id="review-list"></div>
            </div>
        </div>
    </div>

    <div class="inspector-panel">
        <video id="main-player" controls autoplay muted loop></video>
        <div class="detail-box">
            <h2 id="det-title">Select Module</h2>
            <hr style="margin: 10px 0; border: 1px dashed #000;">
            <p id="det-desc">Click on any system in the directory to initialize the visual stream.</p>
        </div>
        <div class="window">
            <div class="title-bar" style="background: var(--win-gray);"><span>SYS_STATUS</span></div>
            <div style="padding: 10px; font-size: 16px;">
                MEM_USAGE: <span id="ram-usage">0MB</span><br>
                LEVEL: <span id="auth-lvl">GUEST</span>
            </div>
        </div>
    </div>

    <div class="taskbar">
        <button class="btn-pixel" style="background:var(--win-red)">START</button>
        <div style="flex-grow: 1; margin-left: 10px;" id="taskbar-user">User: Guest</div>
        <div id="clock">00:00</div>
    </div>
</div>

<script>
const systems = [{name: "Round System"}, {name: "Flower Generation"}, {name: "Weather System"}, {name: "Title System"}, {name: "Backpack System"}, {name: "Upgrade System"}, {name: "Global Announcement"}, {name: "Global Ban"}, {name: "Bridge System"}, {name: "Power System"}, {name: "Generator System"}, {name: "Combat System"}, {name: "Dialogue System"}, {name: "Shop System"}, {name: "Killer/Captain"}, {name: "Data Saving"}, {name: "Movement System"}, {name: "Weapon Choose"}, {name: "NPC Behavior"}];
const randomNames = ["Dev_Pulse", "Script_Sage", "Logic_Zero", "Code_Phantom"];
let currentUser = "Guest", currentRating = 0, currentImageData = "";

// --- BOOT FLOW ---
function login() {
    const val = document.getElementById('username-input').value;
    currentUser = val || "Guest_" + Math.floor(Math.random()*999);
    document.getElementById('boot-screen').style.display = 'none';
    document.getElementById('main-ui').style.display = 'grid';
    document.getElementById('taskbar-user').innerText = "User: " + currentUser;
    if(currentUser === "KCHOR_ADMIN") {
        document.getElementById('admin-wipe').style.display = 'block';
        document.getElementById('auth-lvl').innerText = "ADMIN";
        document.getElementById('auth-lvl').style.color = "red";
    }
    loadReviews();
}
function randomizeName() { document.getElementById('username-input').value = randomNames[Math.floor(Math.random() * randomNames.length)]; }

// --- IMAGE HANDLING & LIGHTBOX ---
function handleImage(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImageData = e.target.result;
            document.getElementById('img-preview').src = currentImageData;
            document.getElementById('preview-wrap').style.display = 'flex';
        };
        reader.readAsDataURL(file);
    }
}
function removeImage() { currentImageData = ""; document.getElementById('preview-wrap').style.display = 'none'; }
function openLightbox(imgSrc) { document.getElementById('lightbox-img').src = imgSrc; document.getElementById('lightbox').style.display = 'flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

// --- REVIEWS ---
function submitReview() {
    const text = document.getElementById('rev-text').value;
    if(!text || currentRating === 0) return alert(" missing rating or comment!");
    const saved = JSON.parse(localStorage.getItem('kchor_v6_logs')) || [];
    saved.push({ user: currentUser, rating: parseInt(currentRating), text: text, img: currentImageData });
    localStorage.setItem('kchor_v6_logs', JSON.stringify(saved));
    
    // Clear inputs
    document.getElementById('rev-text').value = "";
    removeImage();
    currentRating = 0;
    resetStars();
    loadReviews();
}

function loadReviews() {
    const saved = JSON.parse(localStorage.getItem('kchor_v6_logs')) || [];
    const list = document.getElementById('review-list');
    list.innerHTML = saved.length === 0 ? "<i>No logs found.</i>" : "";
    saved.reverse().forEach((r, index) => {
        const div = document.createElement('div');
        div.className = 'review-entry';
        const imgTag = r.img ? `<img src="${r.img}" class="review-pic" onclick="openLightbox('${r.img}')">` : "";
        const canDelete = (r.user === currentUser || currentUser === "KCHOR_ADMIN");
        const deleteBtn = canDelete ? `<button class="del-btn" onclick="deleteReview(${saved.length - 1 - index})">DEL</button>` : "";
        
        div.innerHTML = `
            <div><b>${r.user}</b> <span style="color:orange">${'★'.repeat(r.rating)}</span>${deleteBtn}</div>
            <p>${r.text}</p>
            ${imgTag}
        `;
        list.appendChild(div);
    });
}

function deleteReview(index) {
    if(!confirm("Wipe this log?")) return;
    let saved = JSON.parse(localStorage.getItem('kchor_v6_logs')) || [];
    saved.splice(index, 1);
    localStorage.setItem('kchor_v6_logs', JSON.stringify(saved));
    loadReviews();
}

function clearAllReviews() { if(confirm(" Wipe all logs?")) { localStorage.removeItem('kchor_v6_logs'); loadReviews(); } }

// --- UI UTILS ---
const grid = document.getElementById('sysGrid');
systems.forEach(s => {
    const div = document.createElement('div');
    div.className = 'sys-item';
    div.innerHTML = `<strong>${s.name}</strong><br><small>BOOT.BAT</small>`;
    div.onclick = () => { document.getElementById('det-title').innerText = s.name; };
    grid.appendChild(div);
});

const stars = document.querySelectorAll('#star-rating span');
stars.forEach(s => s.onclick = () => {
    currentRating = s.getAttribute('data-value');
    stars.forEach(star => star.innerText = star.getAttribute('data-value') <= currentRating ? '★' : '☆');
});
function resetStars() { stars.forEach(s => s.innerText = '☆'); }
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); document.getElementById('ram-usage').innerText = Math.floor(Math.random() * 200 + 400) + "MB";}, 1000);
</script>
</body>
</html>
