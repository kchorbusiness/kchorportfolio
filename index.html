<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCHOR.EXE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#fdeec7;
  font-family:'VT323', monospace;
  color:#000;
  overflow-x:hidden;
}

/* TOP BAR */
nav {
  background:#c0c0c0;
  border-bottom:3px solid #000;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:4px 4px 0 #000;
}
.logo {
  font-family:'Press Start 2P';
  font-size:12px;
}
.nav-links a {
  margin-left:15px;
  text-decoration:none;
  color:#000;
  font-size:18px;
}

/* MARQUEE */
marquee {
  background:#000;
  color:lime;
  padding:10px;
  font-size:18px;
}

/* HERO */
.hero {
  padding:60px 20px;
}
.hero h1 {
  font-family:'Press Start 2P';
  font-size:26px;
  margin-bottom:15px;
}
.hero p {
  font-size:20px;
  margin-bottom:20px;
}
.hero button {
  background:yellow;
  border:3px solid #000;
  box-shadow:3px 3px 0 #000;
  padding:10px;
  font-family:'Press Start 2P';
  cursor:pointer;
}
.hero button:active {
  transform:translate(3px,3px);
  box-shadow:none;
}

/* PROJECTS */
.projects {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#fff;
  border:3px solid #000;
  box-shadow:4px 4px 0 #000;
  cursor:pointer;
  transition:0.15s;
}
.card:hover {
  transform:rotate(-2deg) scale(1.05);
}

.window-bar {
  background:#000;
  color:lime;
  padding:6px;
  font-size:14px;
}

.card-body {
  padding:12px;
}
.card-body h3 {
  font-family:'Press Start 2P';
  font-size:11px;
  margin-bottom:10px;
}
.card-body p {
  font-size:18px;
}

/* OVERLAY */
#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:998;
}
#overlay.active {
  opacity:1;
  pointer-events:auto;
}

/* PANEL */
#panel {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  opacity:0;
  width:90%;
  max-width:520px;
  background:#c0c0c0;
  border:4px solid #000;
  box-shadow:6px 6px 0 #000;
  z-index:999;
  transition:0.2s;
}
#panel.active {
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}

.panel-header {
  background:#000;
  color:lime;
  padding:8px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.panel-content {
  padding:15px;
}

video {
  width:100%;
  border:3px solid #000;
  box-shadow:4px 4px 0 #000;
  background:#000;
  margin-bottom:10px;
}

#loading {
  display:none;
  font-size:18px;
  margin-bottom:10px;
  color:#000;
}

/* ABOUT */
.about {
  padding:40px 20px;
}
.about h2 {
  font-family:'Press Start 2P';
  font-size:15px;
  margin-bottom:15px;
}
.about p {
  font-size:20px;
}

/* FOOTER */
footer {
  margin-top:40px;
  padding:10px;
  background:#c0c0c0;
  border-top:3px solid #000;
  text-align:center;
  font-size:18px;
}
</style>

</head>

<body>

<nav>
  <div class="logo">KCHOR.EXE</div>
  <div class="nav-links">
    <a href="#">WORK</a>
    <a href="#">ABOUT</a>
  </div>
</nav>

<marquee>🔥 CLICK PROJECTS TO OPEN THEM 🔥 EVERYTHING IS INTERACTIVE 🔥</marquee>

<section class="hero">
  <h1>HI I'M KCHOR</h1>
  <p>I build chaotic Roblox systems.</p>
  <button onclick="scrollToProjects()">VIEW PROJECTS</button>
</section>

<section class="projects" id="projects"></section>

<section class="about">
  <h2>ABOUT ME</h2>
  <p>Roblox dev focused on systems, gameplay, and fun chaos.</p>
</section>

<footer>
  © KCHOR DEV (NOT REAL YEAR)
</footer>

<!-- OVERLAY -->

<div id="overlay" onclick="closePanel()"></div>

<!-- PANEL -->

<div id="panel">
  <div class="panel-header">
    <span id="panelTitle">PROJECT.EXE</span>
    <span onclick="closePanel()" style="cursor:pointer;">X</span>
  </div>

  <div class="panel-content">
    <div id="loading">Loading project...</div>
    <video id="panelVideo" controls></video>
    <div id="panelText"></div>
  </div>
</div>

<script>
const projects = [
  {
    title:"ROUND SYSTEM",
    desc:"Controls full game loop.",
    full:"Manages lobby, rounds, reset, and syncing.",
    video:"videos/round.mp4"
  },
  {
    title:"WEATHER SYSTEM",
    desc:"Chaos storms & disasters.",
    full:"Tornadoes, blizzards, thunderstorms with warning UI.",
    video:"videos/weather.mp4"
  },
  {
    title:"COMBAT SYSTEM",
    desc:"Punch things hard.",
    full:"Combos, hit detection, knockback physics.",
    video:"videos/combat.mp4"
  }
];

const container = document.getElementById("projects");

projects.forEach((p)=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML = `
    <div class="window-bar">${p.title}.exe</div>
    <div class="card-body">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
    </div>
  `;
  card.onclick=()=>openPanel(p);
  container.appendChild(card);
});

function openPanel(p){
  document.getElementById("overlay").classList.add("active");
  document.getElementById("panel").classList.add("active");

  document.getElementById("panelTitle").textContent = p.title + ".EXE";

  const loading = document.getElementById("loading");
  const video = document.getElementById("panelVideo");
  const text = document.getElementById("panelText");

  video.style.display="none";
  text.innerHTML="";
  loading.style.display="block";

  setTimeout(()=>{
    loading.style.display="none";

    video.src = p.video;
    video.style.display="block";

    text.innerHTML = `
      <p><b>${p.desc}</b></p><br>
      <p>${p.full}</p>
    `;
  }, 700);
}

function closePanel(){
  document.getElementById("overlay").classList.remove("active");
  document.getElementById("panel").classList.remove("active");
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
