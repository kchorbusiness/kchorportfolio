:root {

/* --- DARK MODE OVERRIDES --- */

body.dark-mode {

body.dark-mode .window, 

body.dark-mode .project-card, 

body.dark-mode .login-box {

  color: #c9e8ff !important;

}



body.dark-mode .title-bar {

  background: #1e1e3a !important;

  color: #88c0d8 !important;

  border-bottom: var(--border-thick) solid #445 !important;

}



body.dark-mode .project-header {

  background: #1e1e3a !important;

  color: #c9e8ff !important;

  border-bottom: 2px solid #445 !important;

}



body.dark-mode #rev-text {

  background: #0d0d1a !important;

  color: #c9e8ff !important;

  border: 3px solid #445 !important;

}



body.dark-mode .profile-body p, 

body.dark-mode .profile-info p {

  color: #88c0d8 !important;

}



body.dark-mode #inspector-drawer {

  background: rgba(18, 18, 42, 0.98) !important;

  color: #c9e8ff !important;

  border-color: #000 !important;

}



body.dark-mode #det-desc {

  background: #0d0d1a !important;

  color: #c9e8ff !important;

  border-left: 5px solid #88c0d8 !important;

}



body.dark-mode .system-grid, 

body.dark-mode .skills-grid {

  background: #0d0d1a !important;

}



body.dark-mode #taskbar {

  background: #12122a !important;

  border-top-color: #445 !important;

}



body.dark-mode #taskbar-user, 

body.dark-mode #clock, 

body.dark-mode .contact-strip a, 

body.dark-mode .contact-strip button {

  color: #c9e8ff !important;

}



body.dark-mode .btn-pixel {

  background: #1e1e3a !important;

  color: #c9e8ff !important;

  border-color: #445 !important;

}



body.dark-mode #sidebar {

  background: rgba(18, 18, 42, 0.8) !important;

  border-color: #000 !important;

}



/* --- ORIGINAL ANIMATIONS --- */

.boot-note {

  margin-top: 10px;

  background: rgba(255,255,255,0.08);

  border: 2px solid #0f0;

  padding: 10px 14px;

  width: 400px;

  font-family: 'Share Tech Mono', monospace;

  font-size: 11px;

  color: #0f0;

  text-align: center;

  box-shadow: 0 0 10px rgba(0,255,0,0.2);

  animation: flicker 2s infinite alternate;

}

@keyframes flicker { 0% { opacity: 0.75; } 100% { opacity: 1; } }

@keyframes blink { 50%{opacity:0} }



* { margin:0; padding:0; box-sizing:border-box; font-family: 'VT323', monospace; }

input, textarea, button, select { font-family: 'VT323', monospace !important; }



body {

  background-color: var(--bg-main);

  background-image: radial-gradient(#adb5bd 1.5px, transparent 1.5px);

  background-size: 28px 28px;

  height: 100vh;

  overflow: hidden;

}



#lightbox { position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:10000;cursor:zoom-out;flex-direction:column;gap:10px; }

#lightbox img { max-width:88%;max-height:85%;border:4px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

#email-toast { position:fixed;bottom:48px;right:12px;background:#000;color:#fff;padding:8px 15px;font-family:'Share Tech Mono',monospace;font-size:11px;display:none;z-index:300; border:2px solid var(--win-blue); }



#boot-screen { position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px; }

.boot-log { color:#0f0;font-family:'Share Tech Mono',monospace;font-size:12px;width:400px;height:72px;overflow:hidden;opacity:0.75; }

.login-box { background:var(--win-gray);border:4px solid #000;padding:24px;width:400px;box-shadow:12px 12px 0 #000; }

.blink { animation:blink 1s step-end infinite; }



#sidebar {

  position: fixed; left: calc(50% - var(--col-width)/2 - 54px); top: 50%;

  transform: translateY(-50%); z-index: 200; display: none;

  flex-direction: column; gap: 6px; align-items: center;

  padding: 10px 6px; background: rgba(255,255,255,0.7);

  border: 3px solid #000; box-shadow: 5px 5px 0 #000; backdrop-filter: blur(5px);

}

.icon { position:relative;cursor:pointer; }

.icon-graphic {

  width:36px;height:36px; border:2px solid #000; background:#fff;

  box-shadow:3px 3px 0 #000; display:flex; align-items:center; justify-content:center;

  font-size:18px; transition:0.1s;

}

.icon-graphic:hover { transform:translate(-2px,-2px); box-shadow:5px 5px 0 #000; }

.icon-tip {

  position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);

  background:#000;color:#fff;font-size:12px;padding:3px 8px;

  white-space:nowrap;pointer-events:none;opacity:0;transition:0.2s;z-index:300;

}

.icon:hover .icon-tip { opacity:1; }



#main-ui { display:none;height:calc(100vh - 40px);overflow:hidden; }

.workspace { 

  height: 100%; 

  overflow-y: auto; 

  padding: 40px 0 500px; 

  display: flex; 

  flex-direction: column; 

  align-items: center; 

  gap: 20px;

  

  transform-origin: top center;

}

.window { width:var(--col-width); background:#fff; border:var(--border-thick) solid #000; box-shadow:var(--shadow-block) var(--shadow-block) 0 #000; flex-shrink:0; }

.title-bar { padding:6px 12px; border-bottom:var(--border-thick) solid #000; display:flex; justify-content:space-between; align-items:center; font-weight:bold; font-size:18px; background:var(--win-chrome); }

.window.accented > .title-bar { background:var(--win-blue); color:#000; }



.profile-body { display:flex;gap:15px;padding:15px; flex-wrap:wrap; }

.profile-avatar { width:70px;height:70px;border:3px solid #000;background:var(--win-blue);display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:4px 4px 0 #000; }

.profile-info h1 { font-size:45px; line-height:0.8; }

.status-badge { display:inline-block;background:var(--win-green);border:2px solid #000;padding:2px 10px;font-size:14px;margin-top:8px; }

.stat-chip { background:#000;color:#fff;padding:2px 8px;font-size:13px; }

.skills-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:15px; background:#fff; }

.skill-bar { height:16px; border:2px solid #000; background:#eee; margin-top:4px; }

.skill-fill { height:100%; transition:1.5s cubic-bezier(.4,0,.2,1); }



.system-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px; padding:12px; background:#f0f0f0; }

.sys-item { 

  border:2px solid #000; padding:10px; text-align:center; background:var(--sys-bg, #fff); color:var(--sys-color, #000);

  cursor:pointer; font-size:14px; transition:0.1s; display:flex; flex-direction:column; align-items:center; gap:5px;

}

.sys-item strong { color: inherit; }

.sys-item:hover { background:var(--win-yellow); transform:translate(-1px,-1px); box-shadow:3px 3px 0 #000; }



.project-card { border:2px solid #000; background:#fff; box-shadow:5px 5px 0 #000; margin:12px; overflow:hidden; }

.project-header { padding:8px 12px; border-bottom:2px solid #000; display:flex; justify-content:space-between; background:#f5f0e8; }

.project-body { padding:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; }

.project-media { border:2px solid #000; overflow:hidden; cursor:pointer; position:relative; background:#111; height:115px; }

.project-media video, .project-media img { width:100%; height:100%; object-fit:cover; display: block; }

.media-label { position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); color:#fff; font-size:10px; padding:3px 8px; font-family:'Share Tech Mono'; }



#inspector-drawer {

  position: fixed; top: 10px; right: 10px;

  width: 400px; height: calc(100vh - 60px);

  background: rgba(255, 255, 255, 0.98);

  backdrop-filter: blur(12px);

  border: 4px solid #000;

  box-shadow: -10px 10px 0 rgba(0,0,0,0.15);

  transform: translateX(120%);

  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);

  z-index: 500; display: flex; flex-direction: column; overflow: hidden;

}

#inspector-drawer.open { transform: translateX(0); }

#drawer-titlebar { background: #000; color: #fff; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; letter-spacing: 1px; }



#player-wrap { 

  position: relative; background: #000; margin: 15px; 

  border: 3px solid #000; box-shadow: 5px 5px 0 var(--win-blue);

  aspect-ratio: 16/9; overflow: hidden;

}

#player-wrap::after {

  content: ""; position: absolute; inset: 0;

  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);

  background-size: 100% 4px; z-index: 2; pointer-events: none;

}

#main-player { width:100%; height:100%; display:none; position:relative; z-index:1; }

#no-signal { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0a0a; color:#444; }



#taskbar {

  position:fixed;bottom:0;width:100%;height:40px;

  background:var(--win-gray);border-top:3px solid #000;

  display:flex;align-items:center;padding:0 10px;z-index:100;gap:8px;

}

.btn-pixel { border:2px solid #000; padding:4px 10px; background:#fff; cursor:pointer; box-shadow:2px 2px 0 #000; }

.btn-pixel:active { box-shadow:0 0 0 #000; transform:translate(2px,2px); }



#activity-log { background:#000; color:#0f0; font-family:'Share Tech Mono'; font-size:10px; height:0; transition: 0.3s; overflow-y:auto; }

#activity-log.open { height:100px; padding:8px; border-top:2px solid #333; }

/* =============================================
   DESKTOP ZOOM — keeps the original scaled look
   on large screens without breaking mobile
   ============================================= */
@media (min-width: 900px) {
  body { zoom: 1.8; }
}

/* =============================================
   MOBILE OVERRIDES
   ============================================= */
@media (max-width: 899px) {

  :root { --col-width: 100%; }

  body { overflow-x: hidden; overflow-y: auto; height: auto; }

  /* Boot screen boxes fit narrow screens */
  .boot-log, .login-box { width: 90vw !important; }
  #theme-screen .login-box { width: 90vw !important; }

  /* Main UI scrolls freely */
  #main-ui { height: auto; overflow: visible; }
  .workspace { height: auto; overflow-y: visible; padding: 12px 0 80px; }

  /* Windows fill screen width */
  .window { width: 100%; box-shadow: 4px 4px 0 #000; }

  /* Sidebar moves to a horizontal bar at the top */
  #sidebar {
    position: fixed;
    left: 0; top: auto; bottom: 44px;
    transform: none;
    width: 100%;
    flex-direction: row;
    justify-content: space-around;
    padding: 6px 8px;
    border-left: none; border-right: none;
    box-shadow: 0 -3px 0 #000;
    z-index: 150;
  }
  .icon-tip { display: none; }

  /* Inspector drawer fills screen on mobile */
  #inspector-drawer {
    top: 0; right: 0;
    width: 100%;
    height: 100vh;
    border-left: none;
  }

  /* Skills grid single column */
  .skills-grid { grid-template-columns: 1fr; }

  /* System grid 2 columns */
  .system-grid { grid-template-columns: repeat(2, 1fr); }

  /* Project media single column */
  .project-body { grid-template-columns: 1fr; }

  /* Taskbar — hide volume slider label, compress */
  #taskbar { gap: 5px; padding: 0 6px; font-size: 11px; }
  #vol-slider { width: 44px; }

  /* Workspace padding accounts for sidebar bar at bottom */
  .workspace { padding-bottom: 120px; }

  /* Profile wrap */
  .profile-body { flex-direction: column; }
}



</head>

<script>

/* =========================================================
   SOUND EFFECTS MODULE
   All sounds synthesized via Web Audio API — no external files.
   ========================================================= */
const sfx = (() => {
  let _ctx = null;
  const ctx = () => {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    return _ctx;
  };

  // Short mechanical pixel blip — use on all button clicks
  function click() {
    const c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(880, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, c.currentTime + 0.04);
    g.gain.setValueAtTime(0.12, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
    o.start(); o.stop(c.currentTime + 0.06);
  }

  // Very subtle tick — use on sidebar icon hover
  function tick() {
    const c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine'; o.frequency.value = 1200;
    g.gain.setValueAtTime(0.04, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.025);
    o.start(); o.stop(c.currentTime + 0.025);
  }

  // Two-tone ascending chime — use on OS boot
  function boot() {
    const c = ctx();
    [440, 660].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = c.currentTime + i * 0.2;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.35);
    });
  }

  // Descending swoosh — use when inspector drawer opens
  function drawerOpen() {
    const c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(600, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(200, c.currentTime + 0.2);
    g.gain.setValueAtTime(0.1, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.22);
    o.start(); o.stop(c.currentTime + 0.22);
  }

  // Double harsh buzz — use for invalid/error actions
  function error() {
    const c = ctx();
    [0, 0.07].forEach(delay => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sawtooth'; o.frequency.value = 180;
      const t = c.currentTime + delay;
      g.gain.setValueAtTime(0.13, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o.start(t); o.stop(t + 0.06);
    });
  }

  return { click, tick, boot, drawerOpen, error };
})();

let selectedTheme = 'light';

function pickTheme(mode) {

  selectedTheme = mode;

  const dark = document.getElementById('theme-dark');

  if(mode === 'light') {

    light.style.outline = '4px solid #f1c37d'; light.style.boxShadow = '5px 5px 0 #f1c37d';

    light.style.outline = 'none'; light.style.boxShadow = '5px 5px 0 #000';

  }

}



function applyTheme(){

  if(selectedTheme === 'dark') {

    document.body.classList.add('dark-mode');

    document.documentElement.style.setProperty('--sys-bg', '#12122a');

    document.documentElement.style.setProperty('--sys-color', '#c9e8ff');

  } else {

    document.body.classList.remove('dark-mode');

    document.documentElement.style.setProperty('--sys-bg', '#fff');

    document.documentElement.style.setProperty('--sys-color', '#000');

  }

  

  document.getElementById('taskbar-user').innerText = "USER: " + currentUser.toUpperCase();

  document.getElementById('boot-screen').style.display = 'none';

  // Start music immediately
  startMusic();

  // Run intro, then reveal OS after
  runIntro(() => {
    document.getElementById('main-ui').style.display = 'block';
    document.getElementById('sidebar').style.display = 'flex';
    buildSkills();
    buildSysGrid();
    loadReviews();

  document.getElementById('skills-grid').innerHTML = skills.map(s=>`

function buildSysGrid(){

  const grid=document.getElementById('sysGrid');

  grid.innerHTML="";

  systems.forEach(s=>{

    div.innerHTML=`<div style="font-size:22px;">${s.icon}</div><strong>${s.name}</strong>`;

    div.onmouseenter=()=>{ sfx.tick(); };

  });

}



function openDrawer(s){

  document.getElementById('inspector-drawer').classList.add('open');

  sfx.drawerOpen();

  // Duck background music while video plays
  const music = document.getElementById('bg-music');
  music._prevVol = music.volume;
  music.volume = Math.min(music.volume, 0.08);

  document.getElementById('det-title').innerText = s.name;

  document.getElementById('det-desc').innerText = s.desc;

  document.getElementById('det-tags').innerHTML = (s.tags || []).map(t => `<span class="stat-chip" style="background:var(--win-yellow); color:#000;">${t}</span>`).join('');

  const v = document.getElementById('main-player');

  if(s.vid) { v.src = s.vid; v.style.display = 'block'; v.play().catch(()=>{}); }

  else { v.style.display = 'none'; }

}



function closeDrawer(){
  document.getElementById('inspector-drawer').classList.remove('open');
  // Restore music volume
  const music = document.getElementById('bg-music');
  if (music._prevVol !== undefined) music.volume = music._prevVol;
}

function playInspector(vid, title) { openDrawer({ name: title, desc: "Visual data feed.", vid: vid, tags: ["Visual"] }); }



document.querySelectorAll('#star-rating span').forEach(s=>{

  s.onmouseenter=()=>{ sfx.tick(); };

  s.onclick=()=>{

function handleImage(input){

  if(input.files && input.files[0]){

    const reader = new FileReader();

    reader.onload = e => { currentImageData = e.target.result; document.getElementById('img-preview').src = e.target.result; document.getElementById('preview-wrap').style.display = 'flex'; };

    reader.readAsDataURL(input.files[0]);

  }

}

function removeImage(){ currentImageData=""; document.getElementById('preview-wrap').style.display='none'; }



function submitReview(){

  const text = document.getElementById('rev-text').value.trim();

  if(!text || currentRating == 0) {
    sfx.error();
    return alert("System requires rating and message.");
  }

  const reviews = JSON.parse(localStorage.getItem('kchor_reviews') || '[]');

  reviews.push({ id: Date.now(), user: currentUser, rate: currentRating, msg: text, img: currentImageData });

  localStorage.setItem('kchor_reviews', JSON.stringify(reviews));

  document.getElementById('rev-text').value = ""; removeImage(); loadReviews();

}



function deleteReview(id) {

  if(currentUser !== "KCHOR_ADMIN") return;

  let reviews = JSON.parse(localStorage.getItem('kchor_reviews') || '[]');

  reviews = reviews.filter(r => r.id !== id);

  localStorage.setItem('kchor_reviews', JSON.stringify(reviews));

  loadReviews();

}



function loadReviews(){

  const reviews = JSON.parse(localStorage.getItem('kchor_reviews') || '[]');

  document.getElementById('review-list').innerHTML = reviews.reverse().map(r => `

      <p style="font-family:'Share Tech Mono'; font-size:11px;">${escapeHTML(r.msg)}</p>

      ${r.img ? `<img src="${r.img}" style="max-width:100px; border:2px solid #000; margin-top:5px; cursor:zoom-in;" onclick="sfx.click(); openLightbox('${r.img}', 'Attachment')">` : ''}

      ${currentUser === "KCHOR_ADMIN" ? `<button onclick="sfx.click(); deleteReview(${r.id})" style="position:absolute; right:0; bottom:5px; background:var(--win-red); color:#fff; border:1px solid #000; font-size:10px; cursor:pointer; padding:2px 5px;">DELETE</button>` : ''}

  `).join('');

}

/* =========================================================
   INTRO SEQUENCE
   ========================================================= */
const introLines = [
  "Hello there.\nIt's kchor's workshop \nthank you for stopping by.",
  "Everything you're about to see\nis my journey inside Roblox Studio.\nEvery system, built from scratch.",
  "I hope this brings you even a little bit of what it felt like to build it. Enjoy."
];

function runIntro(onDone) {
  const screen = document.getElementById('intro-screen');
  const text   = document.getElementById('intro-text');

  screen.style.display = 'flex';
  // Fade screen in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { screen.style.opacity = '1'; });
  });

  let i = 0;
  function showLine() {
    if (i >= introLines.length) {
      // Fade whole screen out then launch OS
      screen.style.opacity = '0';
      setTimeout(() => {
        screen.style.display = 'none';
        onDone();
      }, 1300);
      return;
    }
    text.style.opacity = '0';
    setTimeout(() => {
      text.innerText = introLines[i];
      text.style.opacity = '1';
      i++;
      // Hold for reading, then fade out and show next
      setTimeout(() => {
        text.style.opacity = '0';
        setTimeout(showLine, 1000);
      }, 3200);
    }, 200);
  }

  // Small delay so the screen fade-in lands first
  setTimeout(showLine, 600);
}

/* =========================================================
   BACKGROUND MUSIC
   ========================================================= */
let _muted = false;

function startMusic() {
  const music = document.getElementById('bg-music');
  music.volume = 0.3;
  music.play().catch(() => {});
}

function setVolume(val) {
  const music = document.getElementById('bg-music');
  const v = val / 100;
  music.volume = v;
  _muted = v === 0;
  document.getElementById('mute-btn').innerText = v === 0 ? '🔇' : v < 0.5 ? '🔉' : '🔊';
}

function toggleMute() {
  const music = document.getElementById('bg-music');
  const slider = document.getElementById('vol-slider');
  if (_muted) {
    const restore = slider._prevVol || 30;
    slider.value = restore;
    setVolume(restore);
  } else {
    slider._prevVol = parseInt(slider.value);
    slider.value = 0;
    setVolume(0);
  }
}

// Global hover tick — covers all interactive elements including dynamically added ones
document.addEventListener('mouseenter', e => {
  const el = e.target.closest('button, .btn-pixel, .project-media, #theme-light, #theme-dark, #log-toggle, .contact-strip a, .contact-strip button, #lightbox');
  if (el) sfx.tick();
}, true);

setInterval(()=>document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 1000);
